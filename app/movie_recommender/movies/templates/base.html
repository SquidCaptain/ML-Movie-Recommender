{% load static %}

<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Movie Recommender</title>
        <link rel="stylesheet" href="{% static 'movies/style.css' %}">
    </head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="{% url 'home' %}" class="logo">🎬 MovieRec</a>
    </div>

    <div class="nav-right">
        <a href="{% url 'recommend' %}">Content</a>

        {% if user.is_authenticated %}
            <a href="{% url 'recommend_user' %}">Hybrid</a>
            <a href="{% url 'ratings_page' %}">Rate Movies</a>
            <span class="username">Hi, {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn-nav">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn-nav">Login</a>
            <a href="{% url 'register' %}" class="btn-nav">Register</a>
        {% endif %}
    </div>

</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
