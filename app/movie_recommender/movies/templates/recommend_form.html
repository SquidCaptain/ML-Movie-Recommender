<!DOCTYPE html>

<html lang="en">
<head>
    <title>Select Favorite Movies</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'movies/style.css' %}">
</head>
<body>

<h1>Select Your Favorite Movies</h1>

<input type="text" id="search" placeholder="Search for a movie..." style="padding:10px; width:300px;">
<div id="results" class="movie-grid"></div>

<form method="POST">
    {% csrf_token %}
    <div id="selected"></div>
    <button type="submit" class="btn">Get Recommendations</button>
</form>

<script>
const searchInput = document.getElementById("search");
const resultsDiv = document.getElementById("results");
const selectedDiv = document.getElementById("selected");

searchInput.addEventListener("keyup", function() {
    fetch(`/search/?q=${this.value}`)
        .then(response => response.json())
        .then(data => {
            resultsDiv.innerHTML = "";
            data.forEach(movie => {
                const div = document.createElement("div");
                div.classList.add("movie-card");
                div.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w200${movie.poster}">
                    <p>${movie.title}</p>
                    <button type="button" onclick="selectMovie('${movie.title}')">Select</button>
                `;
                resultsDiv.appendChild(div);
            });
        });
});

function selectMovie(title) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "favorites";
    input.value = title;
    selectedDiv.appendChild(input);

    alert(title + " added!");
}
</script>

</body>
</html>
