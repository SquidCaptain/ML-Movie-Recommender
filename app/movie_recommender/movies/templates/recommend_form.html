{% extends "base.html" %}
{% load static %}

{% block content %}
<h1>Select Your Favorite Movies</h1>

<input type="text" id="search" placeholder="Search for a movie..." class="search-bar">

<div id="results" class="movie-grid"></div>

<form method="POST">
    {% csrf_token %}
    <div id="selected"></div>
    <button type="submit" class="btn">Get Recommendations</button>
</form>

<script src="{% static 'movies/recommend_search.js' %}"></script>

{% endblock %}
