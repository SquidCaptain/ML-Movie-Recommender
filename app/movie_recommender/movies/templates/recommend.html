<!DOCTYPE html>

<html lang="en">
<head>
    <title>Your Recommendations</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'movies/style.css' %}">
</head>
<body>

<h1>Top Recommendations For You 🎬</h1>

{% if recommendations %} <div class="movie-grid">
{% for movie in recommendations %} <div class="movie-card">
{% if movie.poster_path %} <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" alt="{{ movie.title }}">
{% endif %} <h4>{{ movie.title }}</h4> <p style="font-size:12px;">{{ movie.genres }}</p> </div>
{% endfor %} </div>
{% else %} <p>No recommendations found. Try selecting different movies.</p>
{% endif %}

<a href="{% url 'recommend' %}" class="btn">Try Again</a> <a href="{% url 'home' %}" class="btn">Home</a>

</body>
</html>
